# 使用 Maple Mono 字体（绝对路径）
# font_family      /data/data/com.termux/files/home/.local/share/fonts/MapleMono.ttf
# bold_font        /data/data/com.termux/files/home/.local/share/fonts/MapleMono.ttf
# italic_font      /data/data/com.termux/files/home/.local/share/fonts/MapleMono.ttf
# bold_italic_font /data/data/com.termux/files/home/.local/share/fonts/MapleMono.ttf

# 设置字体大小
font_size 11


# BEGIN_KITTY_FONTS
font_family      family="Maple Mono NF CN"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
#################################### HIGHLIGHT #################################
mark1_foreground #74c7ec
mark1_background #1E1E2E
mark2_foreground #F9E2AF
mark2_background #1E1E2E
mark3_foreground #F38BA8
mark3_background #1E1E2E
toggle_marker regex 1 \\bINFO\\b 2 \\bWARNING\\b 3 \\bERROR\\b 3 \\bFATAL\\b
map ctrl+shift+m toggle_marker regex 1 \\bINFO\\b 2 \\bWARNING\\b 3 \\bERROR\\b 3 \\bFATAL\\b

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include theme.conf
# END_KITTY_THEME
#################################### CURSOR ####################################
cursor_shape block
cursor_blink_interval 0
detect_urls no
mouse_hide_wait 0.5
# 光标颜色（Catppuccin Mocha 紫色）
cursor           #cba6f7

# 光标下文字的颜色
cursor_text_color #1e1e2e

# 光标闪烁间隔（秒）。设为 0 禁用闪烁，负值使用系统默认
cursor_blink_interval     0.5

# 停止闪烁的闲置时间（秒）。设为 0 或负值则永不停止
cursor_stop_blinking_after 0

# tab bar
tab_bar_style powerline

# ============================================
# 延迟优化（降低输入延迟）
# ============================================
# 输入延迟（毫秒）- 值越小响应越快，默认 3ms
input_delay 0

# 重绘延迟（毫秒）- 值越小越流畅，默认 10ms
repaint_delay 2

# 禁用同步到显示器（减少延迟，可能有轻微撕裂）
sync_to_monitor no

# ============================================
# 滚动与缓存优化
# ============================================
# 滚动缓冲行数（存储在 RAM 中，平衡性能和内存）
# 730G 建议 5000-10000，太大会增加内存压力
scrollback_lines 9999

# 滚动页面大小（默认 1，调大可加速滚动）
wheel_scroll_multiplier 5

# ============================================
# 光标动画优化（如果觉得卡可以禁用）
# ============================================
# 完全禁用光标拖尾（最省资源）
# cursor_trail 0

# 或者保留但降低开销
# cursor_trail 1
# cursor_trail_decay 0.15 0.45
# cursor_trail_start_threshold 3

# ============================================
# 窗口管理优化
# ============================================
# 记住上次窗口大小（避免重新计算）
remember_window_size yes

# 禁用窗口装饰（减少渲染开销）
# hide_window_decorations yes

# ============================================
# 渲染后端（Kitty 默认已最优，保持默认即可）
# ============================================
# Linux/X11 下默认使用 OpenGL
# graphics_backend opengl
